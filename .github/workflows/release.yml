name: Release

on:
  push:
    tags:
      - "paintcannon@*.*.*"
      - "paintcannon-react@*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DEBUG: napi:*
  CARGO_INCREMENTAL: "1"

jobs:
  native-targets:
    name: Native Targets
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'paintcannon@')
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: matrix
        run: echo "matrix=$(node scripts/native-build-matrix.mjs)" >> "$GITHUB_OUTPUT"

  build-native:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.host }}
    needs: native-targets
    if: startsWith(github.ref_name, 'paintcannon@')
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.native-targets.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: mlugg/setup-zig@v2
        if: ${{ matrix.zig }}
        with:
          version: 0.14.1
      - uses: taiki-e/install-action@v2
        if: ${{ matrix.zig }}
        with:
          tool: cargo-zigbuild
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.napi-rs
            target/
            paintcannon/target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('paintcannon/Cargo.lock') }}
      - run: npm ci
      - run: ${{ matrix.build }}
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: |
            paintcannon/dist/napi/paintcannon.*.node
          if-no-files-found: error

  publish-paintcannon:
    name: Publish paintcannon
    runs-on: ubuntu-latest
    needs: build-native
    if: startsWith(github.ref_name, 'paintcannon@')
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: node scripts/verify-release-tag.mjs paintcannon
      - run: npm run create-npm-dirs --workspace paintcannon
      - uses: actions/download-artifact@v4
        with:
          path: paintcannon/artifacts
      - run: npm run artifacts --workspace paintcannon
      - run: npm publish --workspace paintcannon --access public --provenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-paintcannon-react:
    name: Publish paintcannon-react
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'paintcannon-react@')
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - run: node scripts/verify-release-tag.mjs paintcannon-react
      - run: npm run build --workspace paintcannon-react
      - run: npm publish --workspace paintcannon-react --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
