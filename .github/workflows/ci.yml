name: CI

on:
  push:
    branches:
      - main
    tags-ignore:
      - "**"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEBUG: napi:*
  CARGO_INCREMENTAL: "1"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: npm ci
      - run: npm run format:check
      - run: cargo fmt --check
        working-directory: paintcannon
      - run: npm run build --workspaces
      - run: npm run test

  native-targets:
    name: Native Targets
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: matrix
        run: echo "matrix=$(node scripts/native-build-matrix.mjs)" >> "$GITHUB_OUTPUT"

  build-native:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.host }}
    needs: native-targets
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.native-targets.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: mlugg/setup-zig@v2
        if: ${{ matrix.zig }}
        with:
          version: 0.14.1
      - uses: taiki-e/install-action@v2
        if: ${{ matrix.zig }}
        with:
          tool: cargo-zigbuild
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.napi-rs
            target/
            paintcannon/target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('paintcannon/Cargo.lock') }}
      - run: npm ci
      - run: ${{ matrix.build }}
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: |
            paintcannon/dist/napi/paintcannon.*.node
          if-no-files-found: error
